name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  SUPPORT_METRICS_BASELINE_PATH: outputs/ci/support_metrics_baseline.jsonl
  SUPPORT_METRICS_CURRENT_PATH: outputs/ci/support_metrics_current.jsonl
  SUPPORT_METRICS_REPORT_PATH: artifacts/support_metrics_report.md
  SUPPORT_METRICS_CONTRACT_AUDIT_REPORT_PATH: artifacts/support_metrics_ci_contract_audit.md

jobs:
  tests:
    runs-on: windows-latest
    steps:
      # Base setup
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Core validation
      - name: Run unit tests
        run: py -m unittest discover -s tests -p "test_*.py"

      - name: Validate support metrics CI manifest
        run: py tools/check_support_metrics_ci_manifest.py --check

      - name: Validate support metrics CI fragments
        run: py tools/check_support_metrics_ci_fragments.py --validate

      - name: Validate support metrics CI contract audit
        shell: pwsh
        run: |
          $contractAuditExitCode = 0

          py tools/audit_support_metrics_ci_contract.py --check --markdown-output "$env:SUPPORT_METRICS_CONTRACT_AUDIT_REPORT_PATH"

          $contractAuditExitCode = $LASTEXITCODE

          if (Test-Path "$env:SUPPORT_METRICS_CONTRACT_AUDIT_REPORT_PATH") {
            Get-Content "$env:SUPPORT_METRICS_CONTRACT_AUDIT_REPORT_PATH" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

          if ($contractAuditExitCode -ne 0) {
            exit $contractAuditExitCode
          }

      - name: Upload support metrics CI contract audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-metrics-ci-contract-audit
          path: artifacts/support_metrics_ci_contract_audit.md
          if-no-files-found: error

      # Global CI health report (blocking for CI/debug chain integrity)
      - name: Validate support metrics CI health
        shell: pwsh
        run: |
          $healthExitCode = 0

          py tools/check_support_metrics_ci_health.py --check --markdown-output artifacts/support_metrics_ci_health.md

          $healthExitCode = $LASTEXITCODE

          if (Test-Path artifacts/support_metrics_ci_health.md) {
            Get-Content artifacts/support_metrics_ci_health.md | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

          if ($healthExitCode -ne 0) {
            exit $healthExitCode
          }

      - name: Upload support metrics CI health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-metrics-ci-health
          path: artifacts/support_metrics_ci_health.md
          if-no-files-found: error

      # Smoke report: technical pipeline check with controlled fixtures
      - name: Smoke test support metrics CI summary (technical fixtures)
        shell: pwsh
        run: |
          py tools/write_support_metrics_ci_summary.py `
            --ci-check `
            --baseline tests/fixtures/support_metrics_contract/recent_complete.jsonl `
            --current tests/fixtures/support_metrics_contract/recent_complete.jsonl `
            --report-output artifacts/support_metrics_smoke_report.md `
            --step-summary "$env:GITHUB_STEP_SUMMARY" `
            --artifact-name "support-metrics-smoke-report" `
            --report-mode "smoke" `
            --input-label "fixtures:recent_complete.jsonl" `
            --compare-input-label "fixtures:recent_complete.jsonl"

      - name: Upload support metrics smoke report artifact (technical fixtures)
        uses: actions/upload-artifact@v4
        with:
          name: support-metrics-smoke-report
          path: artifacts/support_metrics_smoke_report.md
          if-no-files-found: error

      # Runtime report: optional, uses outputs/ci if present
      - name: Optional runtime support metrics CI check (outputs/ci)
        shell: pwsh
        run: |
          py tools/write_support_metrics_ci_summary.py `
            --ci-check `
            --baseline "$env:SUPPORT_METRICS_BASELINE_PATH" `
            --current "$env:SUPPORT_METRICS_CURRENT_PATH" `
            --report-output "$env:SUPPORT_METRICS_REPORT_PATH" `
            --step-summary "$env:GITHUB_STEP_SUMMARY" `
            --artifact-name "support-metrics-report" `
            --report-mode "runtime" `
            --input-label "$env:SUPPORT_METRICS_BASELINE_PATH" `
            --compare-input-label "$env:SUPPORT_METRICS_CURRENT_PATH"

      - name: Upload support metrics runtime report artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: support-metrics-report
          path: artifacts/support_metrics_report.md
          if-no-files-found: ignore
